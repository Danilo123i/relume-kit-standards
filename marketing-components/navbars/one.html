<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>one</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            background: none;
            font-family: "Roboto", sans-serif;
            font-style: normal;
        }

        header{
            width: 100%;
            height: 72px;
            display: flex;
            padding: 0 64px;
            justify-content: space-between;
            align-items: center;
        }

        header > img{
            width: 80px;
            height: 40px;
        }

        .header-nav {
            display: flex;
            gap: 32px;
            align-items: center;
            justify-content: center;
        }
        nav{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 32px;
        }
        a{
            font-size: 16px;
            font-weight: 400px;
            color: black;
        }
        nav > button {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            font-size: 16px;
        }
        button > p {
            font-size: 16px;
            font-weight: 400;
            color: black;
        }
        .btn-wrapper {
            display: flex;
            gap: 16px;
        }
        .btn-wrapper > button {
            padding: 8px 20px;
            border: 1px solid black;
        }
        .btn-secondary{
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <img src="./assets/images/Company Logo.svg" alt="image logo compania">
        <div class="header-nav">
            <nav><a href="">link one</a>
                <a href="">link two</a>
                <a href="">link three</a>
                <button>
                    <p>link four</p>
                    <img src="./assets/images/Chevron Down.svg" alt="image chevron baixo">
                </button>
            </nav>
            <div class="btn-wrapper">
                <button>button</button>
                <button class="btn-secondary">button</button></div>
        </div>
    </header>
</body>
</html>
